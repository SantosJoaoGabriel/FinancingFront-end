<h2>Transações</h2>

<form class="form-nova" (ngSubmit)="adicionarTransacao()">
  <mat-form-field appearance="fill">
    <mat-label>Descrição</mat-label>
    <input matInput [(ngModel)]="novaTransacao.descricao" name="descricao">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Categoria</mat-label>
    <input matInput [(ngModel)]="novaTransacao.categoria" name="categoria">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Data</mat-label>
    <input matInput type="date" [(ngModel)]="novaTransacao.data" name="data">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Valor</mat-label>
    <input matInput type="number" [(ngModel)]="novaTransacao.valor" name="valor">
  </mat-form-field>

  <button mat-raised-button color="primary" type="submit">
    Adicionar
  </button>
</form>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 transacoes-table">

  <ng-container matColumnDef="descricao">
    <th mat-header-cell *matHeaderCellDef> Descrição </th>
    <td mat-cell *matCellDef="let item"> {{ item.descricao }} </td>
  </ng-container>

  <ng-container matColumnDef="categoria">
    <th mat-header-cell *matHeaderCellDef> Categoria </th>
    <td mat-cell *matCellDef="let item"> {{ item.categoria }} </td>
  </ng-container>

  <ng-container matColumnDef="data">
    <th mat-header-cell *matHeaderCellDef> Data </th>
    <td mat-cell *matCellDef="let item"> {{ item.data | date:'dd/MM/yyyy' }} </td>
  </ng-container>

  <ng-container matColumnDef="valor">
    <th mat-header-cell *matHeaderCellDef> Valor </th>
    <td mat-cell *matCellDef="let item"> {{ item.valor | currency:'BRL' }} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
