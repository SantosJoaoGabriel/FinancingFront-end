<div class="ganhos-page">
  <div class="page-header">
    <h2>All Income</h2>
  </div>

  <form class="filters-row" (ngSubmit)="adicionarGanho()">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Descrição</mat-label>
      <input matInput [(ngModel)]="novoGanho.descricao" name="descricao">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Categoria</mat-label>
      <input matInput [(ngModel)]="novoGanho.categoria" name="categoria">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Método</mat-label>
      <input matInput [(ngModel)]="novoGanho.metodo" name="metodo">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Data</mat-label>
      <input matInput type="date" [(ngModel)]="novoGanho.data" name="data">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Valor</mat-label>
      <input matInput type="number" [(ngModel)]="novoGanho.valor" name="valor">
    </mat-form-field>

    <button mat-fab color="primary" class="fab-add" type="submit" aria-label="Adicionar ganho">
      <mat-icon>add</mat-icon>
    </button>
  </form>

  <div class="table-card">
    <table mat-table [dataSource]="dataSource" class="ganhos-table">
      <ng-container matColumnDef="data">
        <th mat-header-cell *matHeaderCellDef>DATE</th>
        <td mat-cell *matCellDef="let item">{{ item.data | date:'dd/MM/yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="descricao">
        <th mat-header-cell *matHeaderCellDef>INCOME DETAILS</th>
        <td mat-cell *matCellDef="let item">{{ item.descricao }}</td>
      </ng-container>

      <ng-container matColumnDef="categoria">
        <th mat-header-cell *matHeaderCellDef>CATEGORY</th>
        <td mat-cell *matCellDef="let item">{{ item.categoria }}</td>
      </ng-container>

      <ng-container matColumnDef="metodo">
        <th mat-header-cell *matHeaderCellDef>PAYMENT METHOD</th>
        <td mat-cell *matCellDef="let item">{{ item.metodo }}</td>
      </ng-container>

      <ng-container matColumnDef="valor">
        <th mat-header-cell *matHeaderCellDef>AMOUNT</th>
        <td mat-cell *matCellDef="let item" class="valor-cell">
          {{ item.valor | currency:'BRL' }}
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
