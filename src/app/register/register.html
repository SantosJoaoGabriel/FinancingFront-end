<div class="register-page">
  <header class="topbar">
    <div class="brand">SaveUp</div>
  </header>

  <main class="register-main">
    <div class="bg-shape bg-shape-left"></div>
    <div class="bg-shape bg-shape-right"></div>

    <section class="register-wrapper">
      <div class="register-card">
        <div class="register-header">
          <h1>Criar Usuário</h1>
          <p>Comece sua jornada financeira com precisão.</p>
        </div>

        <form #registerForm="ngForm" class="register-form" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="nome">Nome Completo</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">person</span>
              <input
                id="nome"
                name="nome"
                type="text"
                [(ngModel)]="nome"
                placeholder="Ex: João Silva"
                required />
            </div>
          </div>

          <div class="form-group">
            <label for="email">E-mail</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">mail</span>
              <input
                id="email"
                name="email"
                type="email"
                [(ngModel)]="email"
                placeholder="nome@exemplo.com"
                required />
            </div>
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">lock</span>
              <input
                id="senha"
                name="senha"
                type="password"
                [(ngModel)]="senha"
                placeholder="••••••••"
                required />
            </div>
          </div>

          <div class="form-group">
            <label for="confirmarSenha">Confirmar Senha</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined input-icon">lock_reset</span>
              <input
                id="confirmarSenha"
                name="confirmarSenha"
                type="password"
                [(ngModel)]="confirmarSenha"
                placeholder="••••••••"
                required />
            </div>
            <small class="error-text" *ngIf="senhasDiferentes">
              As senhas não coincidem.
            </small>
          </div>

          <div class="terms-row">
            <input
              id="terms"
              name="terms"
              type="checkbox"
              [(ngModel)]="aceitarTermos" />
            <label for="terms">
              Aceito os <a href="#">Termos e Condições</a> de uso e política de privacidade.
            </label>
          </div>

          <p class="error-message" *ngIf="errorMessage">
            {{ errorMessage }}
          </p>

          <p class="success-message" *ngIf="successMessage">
            {{ successMessage }}
          </p>

          <button class="submit-btn" type="submit" [disabled]="loading">
            <span *ngIf="!loading">Criar Conta</span>
            <span *ngIf="loading" class="loading-content">
              <span class="material-symbols-outlined spin">sync</span>
              Criando...
            </span>
          </button>
        </form>

        <div class="bottom-link">
          <p>
            Já possui uma conta?
            <a routerLink="/login">Entrar</a>
          </p>
        </div>
      </div>

      <div class="security-row">
        <div class="security-line"></div>
        <span class="material-symbols-outlined">security</span>
        <div class="security-line"></div>
      </div>
    </section>
  </main>

  <footer class="register-footer">
    <div class="footer-brand">SaveUp</div>
    <p>© 2026 SaveUp. Todos os direitos reservados.</p>
  </footer>
</div>
